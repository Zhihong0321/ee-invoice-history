<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5.0, viewport-fit=cover">
  <title>Invoice History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #3B82F6;
      /* Light theme tokens */
      --bg-light: #EDF1F6;
      --surface-light: #FFFFFF;
      --surface2-light: #F5F8FB;
      --border-light: #E4E9F0;
      --text-light: #101B2D;
      --text2-light: #566379;
      --text3-light: #93A1B5;
      --shadow-light: 0 1px 2px rgba(16,27,45,.05), 0 2px 6px rgba(16,27,45,.04);

      /* Dark theme tokens */
      --bg-dark: #0A0F1A;
      --surface-dark: #121A2A;
      --surface2-dark: #0E1626;
      --border-dark: #212C40;
      --text-dark: #E7EDF5;
      --text2-dark: #93A4BC;
      --text3-dark: #5E6F88;
      --shadow-dark: 0 1px 2px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.3);
    }

    body.theme-light {
      --bg: var(--bg-light);
      --surface: var(--surface-light);
      --surface2: var(--surface2-light);
      --border: var(--border-light);
      --text: var(--text-light);
      --text2: var(--text2-light);
      --text3: var(--text3-light);
      --shadow: var(--shadow-light);
    }

    body.theme-dark {
      --bg: var(--bg-dark);
      --surface: var(--surface-dark);
      --surface2: var(--surface2-dark);
      --border: var(--border-dark);
      --text: var(--text-dark);
      --text2: var(--text2-dark);
      --text3: var(--text3-dark);
      --shadow: var(--shadow-dark);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: background 0.15s ease, color 0.15s ease;
    }

    ::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    input::placeholder {
      color: var(--text3);
    }

    @keyframes ihpulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .35; }
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }

    .animated-fadein {
      animation: fadein 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Stagger helpers */
    .stagger-0 { animation-delay: 0ms; }
    .stagger-1 { animation-delay: 40ms; }
    .stagger-2 { animation-delay: 80ms; }
    .stagger-3 { animation-delay: 120ms; }
    .stagger-4 { animation-delay: 160ms; }
    .stagger-5 { animation-delay: 200ms; }
    .stagger-6 { animation-delay: 240ms; }
    .stagger-7 { animation-delay: 280ms; }
  </style>
</head>
<body class="theme-light">
  <div id="app" style="position:relative; min-height:100vh; max-width:452px; margin:0 auto; padding-bottom:48px;">
    <!-- Chrome Header & View Controls will be managed here dynamically -->
    <div id="view-header"></div>
    <!-- Main Content Timeline -->
    <main id="view-content" style="padding:6px 14px 0;"></main>
  </div>

  <script src="/js/app.js" defer></script>
</body>
</html>
